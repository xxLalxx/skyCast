<div class="dashboard-container">
  
  <section class="current-weather-card">
    
    <div class="card-header">
      <div class="location-meta">
        <h2>Kollam</h2>
        <p class="weather-date">Sunday, 7:40 PM</p>
      </div>
      <div class="condition-badge">Mostly Sunny</div>
    </div>

    <div class="card-body">
      <div class="temp-display">
        <span class="main-temp">36</span><span class="unit">°C</span>
      </div>
      <div class="weather-icon-large">☀️</div>
    </div>

    <div class="metrics-grid">
      <div class="metric-item">
        <span class="metric-icon">💧</span>
        <div class="metric-info">
          <span class="metric-label">Humidity</span>
          <span class="metric-value">64%</span>
        </div>
      </div>

      <div class="metric-item">
        <span class="metric-icon">💨</span>
        <div class="metric-info">
          <span class="metric-label">Wind Speed</span>
          <span class="metric-value">12 km/h</span>
        </div>
      </div>

      <div class="metric-item">
        <span class="metric-icon">🌧️</span>
        <div class="metric-info">
          <span class="metric-label">Precipitation</span>
          <span class="metric-value">10%</span>
        </div>
      </div>
    </div>

  </section>

  <section class="forecast-section">
    <h3 class="section-title">3-Day Forecast</h3>
    
    <div class="forecast-grid">
      
      <div class="forecast-card">
        <span class="forecast-day">Tomorrow</span>
        <span class="forecast-icon">🌦️</span>
        <span class="forecast-condition">Light Rain</span>
        <div class="forecast-temps">
          <span class="temp-high">32°</span>
          <span class="temp-low">25°</span>
        </div>
      </div>

      <div class="forecast-card">
        <span class="forecast-day">Tue, Jun 9</span>
        <span class="forecast-icon">☁️</span>
        <span class="forecast-condition">Cloudy</span>
        <div class="forecast-temps">
          <span class="temp-high">30°</span>
          <span class="temp-low">24°</span>
        </div>
      </div>

      <div class="forecast-card">
        <span class="forecast-day">Wed, Jun 10</span>
        <span class="forecast-icon">☀️</span>
        <span class="forecast-condition">Sunny</span>
        <div class="forecast-temps">
          <span class="temp-high">35°</span>
          <span class="temp-low">26°</span>
        </div>
      </div>

    </div>
  </section>
  
</div>
