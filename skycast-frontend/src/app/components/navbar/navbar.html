<nav class="navbar">
  <div class="nav-left-group">
    <div class="nav-brand">
      <span class="logo-icon">🌦️</span> skyCast
    </div>
    
    <div class="nav-menu">
      <a href="#" (click)="$event.preventDefault(); goHome()" class="nav-item">Home</a>
      <a href="#" class="nav-item">Settings</a>
    </div>

    <div class="nav-search">
      <div class="search-box">
        <input 
          type="text" 
          placeholder="Search city (e.g., London)..." 
          (keyup.enter)="onSearch(cityInput.value)" 
          #cityInput />
        <button (click)="onSearch(cityInput.value)" class="search-btn">🔍</button>
      </div>
    </div>
  </div>

  <div class="nav-right-group">
    <div class="location-display" title="Your detected live location">
      <span class="location-icon">📍</span>
      <div class="location-text">
        <span class="city-name">{{ currentPlace }}</span>
        <span class="state-name" *ngIf="currentState">, {{ currentState }}</span>
      </div>
    </div>

    <!-- <div class="profile-placeholder" title="Profile coming next week">
      <div class="avatar-mock">A</div>
    </div> -->
  </div>
</nav>
